<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agro Forte</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="fade">
  <h1>🌱 Agro Forte</h1>
  <p>Futuro sustentável com tecnologia</p>
</header>

<nav>
  <a href="#">Início</a>
  <a href="#galeria">Galeria</a>
</nav>

<section class="hero fade">
  <div class="overlay"></div>
  <h1>Agro + Tecnologia + Sustentabilidade 🚜</h1>
</section>

<section id="galeria" class="container fade">
  <h2>📸 Galeria Tecnológica</h2>

  <!-- UPLOAD -->

  <input type="file" id="upload" accept="image/*">

  <div class="galeria" id="galeriaContainer">
    <img src="https://cdn.pixabay.com/photo/2016/11/29/03/53/drone-1866742_1280.jpg">
    <img src="https://cdn.pixabay.com/photo/2016/11/18/14/00/solar-1835993_1280.jpg">
    <img src="https://cdn.pixabay.com/photo/2017/07/13/10/07/farmer-2491169_1280.jpg">
    <img src="https://cdn.pixabay.com/photo/2016/10/12/22/24/wheat-1738160_1280.jpg">
  </div>
</section>

<!-- ZOOM COM NAVEGAÇÃO -->

<div id="modal" class="modal">
  <span class="fechar" onclick="fecharZoom()">✖</span>
  <span class="prev" onclick="trocar(-1)">❮</span>
  <img id="imgZoom">
  <span class="next" onclick="trocar(1)">❯</span>
</div>

<script src="script.js"></script>

</body>
</html>
