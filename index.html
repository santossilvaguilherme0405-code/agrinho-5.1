<!-- LOGIN MODERNO -->
<div id="loginScreen" class="login-screen">

  <div class="login-box-modern">

    <h1>Log in</h1>

    <p class="top-text">
      Novo no AgroVision?
      <span>Criar conta gratuita</span>
    </p>

    <input type="email" placeholder="Email address">

    <input type="password" placeholder="Password (8+ characters)">

    <p class="forgot">
      Forgot password?
    </p>

    <button id="entrar" class="login-btn">
      LOG IN
    </button>

    <div class="socials">

      <button class="social apple">
        🍎
      </button>

      <button class="social facebook">
        f
      </button>

      <button class="social google">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
      </button>

    </div>

    <div class="secure">
      🔒 LOG IN WITH SSO
    </div>

  </div>

</div>
