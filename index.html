<!-- LOGIN GOOGLE ESTILO REAL -->
<div id="loginScreen" class="login-screen">

  <div class="google-login">

    <img
      class="google-logo"
      src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg"
    >

    <h2>Fazer login</h2>

    <p class="subtitle">
      Use sua Conta AgroVision
    </p>

    <input
      type="text"
      placeholder="E-mail ou celular"
      id="email"
    >

    <p class="senha">
      Esqueceu a senha?
    </p>

    <div class="linha">

      <div></div>

      <span>ou</span>

      <div></div>

    </div>

    <button class="google-btn">
      <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
    </button>

    <div class="bottom">

      <p>Criar conta</p>

      <button id="entrar">
        Entrar
      </button>

    </div>

  </div>

</div>
